<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ID Flashcards</title>
<style>
:root {
  --sage-dk: #4a6e68; --sage-md: #6F928A; --sage-lt: #C4D4C8;
  --ink: #2e2218; --ink-mid: #5a4a38; --ink-light: #9a8870;
  --cream: #f0ece4; --white: #ffffff;
  --border: rgba(46,34,24,0.12);
  --correct-bg: #e8f0d4; --correct-dk: #4a7a20;
  --wrong-bg: #f5d8d8; --wrong-dk: #a03030;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--cream); min-height: 100vh; display: flex; flex-direction: column; }

/* ── HEADER ── */
.header { background: var(--sage-dk); padding: 12px 28px; display: flex;
  align-items: center; gap: 12px; border-bottom: 3px solid var(--sage-md); flex-shrink: 0; }
.header h1 { font-family: Georgia, serif; font-size: 18px; font-weight: 400;
  color: var(--sage-lt); flex: 1; }
.header h1 span { font-weight: 600; }
.nav-btn { font-size: 11px; font-weight: 500; padding: 6px 14px; border-radius: 99px;
  border: 1px solid rgba(196,212,200,.3); background: rgba(255,255,255,.08);
  color: var(--sage-lt); cursor: pointer; transition: background .15s; }
.nav-btn:hover { background: rgba(255,255,255,.14); }
.mode-group { display: flex; background: rgba(0,0,0,.2); border-radius: 8px; padding: 3px; gap: 2px; }
.mode-btn { font-size: 10px; font-weight: 600; padding: 4px 12px; border-radius: 6px;
  border: none; background: transparent; color: #7aA07a; cursor: pointer; letter-spacing: .03em; }
.mode-btn.on { background: rgba(255,255,255,.15); color: var(--sage-lt); }

/* ── BEGIN SCREEN ── */
.begin-screen { flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 20px; }
.begin-card { background: var(--white); border-radius: 18px; padding: 48px 56px;
  text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,.08); max-width: 420px; }
.begin-card h2 { font-family: Georgia, serif; font-size: 24px; color: var(--ink); margin-bottom: 8px; }
.begin-card p { font-size: 13px; color: var(--ink-light); line-height: 1.6; margin-bottom: 28px; }
.begin-btn { font-size: 14px; font-weight: 600; padding: 13px 40px; border-radius: 99px;
  border: none; background: var(--sage-md); color: var(--white); cursor: pointer; }
.begin-btn:hover { background: var(--sage-dk); }
.begin-stats { font-size: 12px; color: var(--ink-light); }

/* ── ARENA ── */
.arena { flex: 1; display: flex; align-items: flex-start; justify-content: center;
  gap: 32px; padding: 30px 40px; }

/* ── STACKS ── */
.stack-zone { width: 130px; display: flex; flex-direction: column; align-items: center; gap: 8px; padding-top: 12px; }
.stack-label { font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: .07em; color: var(--ink-light); margin-bottom: 2px; }
.stack-pile { position: relative; width: 112px; height: 112px; cursor: pointer; }
.stack-pile:hover { opacity: .9; }
.stack-card { position: absolute; width: 100px; height: 100px; border-radius: 8px;
  border: .5px solid rgba(0,0,0,.15); overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,.12); }
.stack-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
.stack-ini { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
  font-size: 20px; font-weight: 500; color: rgba(255,255,255,.9); }
.stack-count { font-size: 13px; font-weight: 700; }
.stack-empty { width: 100px; height: 100px; border-radius: 8px;
  border: 2px dashed rgba(154,136,112,.3); display: flex; align-items: center;
  justify-content: center; font-size: 11px; color: rgba(154,136,112,.4); }

/* ── CENTRAL ── */
.central { display: flex; flex-direction: column; align-items: center; gap: 14px; }
.progress { font-size: 11px; color: var(--ink-light); font-weight: 500; letter-spacing: .04em; }

.card-img { width: 380px; height: 380px; border-radius: 14px; overflow: hidden;
  box-shadow: 0 6px 28px rgba(0,0,0,.18); border: .5px solid rgba(0,0,0,.1);
  background: #c8c0b8; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.card-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
.card-img-ini { font-family: Georgia, serif; font-size: 64px; font-weight: 500;
  color: rgba(255,255,255,.7); letter-spacing: .04em; }
.card-star { position: relative; }
.card-star-badge { position: absolute; top: 10px; left: 10px; font-size: 22px;
  color: #E6C47A; text-shadow: 0 1px 4px rgba(0,0,0,.3); pointer-events: none; }

/* ── INPUT ── */
.input-area { width: 380px; display: flex; flex-direction: column; gap: 8px; }
.name-row { display: flex; gap: 8px; position: relative; }
.name-input { flex: 1; font-size: 14px; padding: 10px 14px; border-radius: 99px;
  border: 1.5px solid var(--sage-lt); background: var(--white); outline: none; color: var(--ink); }
.name-input:focus { border-color: var(--sage-md); }
.submit-btn { font-size: 13px; font-weight: 600; padding: 10px 20px; border-radius: 99px;
  border: none; background: var(--sage-md); color: var(--white); cursor: pointer; white-space: nowrap; }
.submit-btn:hover { background: var(--sage-dk); }
.mode-hint { font-size: 10px; color: var(--sage-md); text-align: center; letter-spacing: .03em; }

/* ── RESULT ── */
.result-area { width: 380px; border-radius: 12px; overflow: hidden;
  border: .5px solid rgba(0,0,0,.1); box-shadow: 0 2px 10px rgba(0,0,0,.07); }
.result-hdr { padding: 12px 16px; }
.result-hdr.correct { background: var(--correct-bg); }
.result-hdr.wrong   { background: var(--wrong-bg); }
.result-verdict { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.result-icon { font-size: 18px; font-weight: 700; }
.result-vword { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; }
.correct .result-vword { color: var(--correct-dk); }
.wrong   .result-vword { color: var(--wrong-dk); }
.result-star { font-size: 16px; color: #C39A5D; margin-left: 2px; }
.result-rows { display: flex; flex-direction: column; gap: 4px; }
.result-meta { font-size: 8.5px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .06em; color: var(--ink-light); margin-bottom: 1px; }
.result-val-name { font-family: Georgia, serif; font-size: 15px; font-weight: 600; color: var(--ink); }
.result-val-guess { font-size: 11px; color: var(--ink-light); font-style: italic; }
.result-body { background: var(--white); padding: 12px 16px; display: flex; flex-direction: column; gap: 9px; }
.result-row { display: flex; gap: 8px; align-items: flex-start; }
.result-lbl { font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em;
  color: var(--ink-light); width: 52px; flex-shrink: 0; padding-top: 1px; }
.result-text { font-size: 11px; color: #4a5548; line-height: 1.5; }
.cat-pill { display: inline-block; font-size: 8.5px; font-weight: 700; padding: 2px 7px;
  border-radius: 99px; color: var(--white); letter-spacing: .03em; }
.cat-pill-wide { background: transparent; border: 1px solid; color: #8a7a60; opacity: .7; }
.next-btn { width: 100%; padding: 11px; font-size: 13px; font-weight: 600;
  border: none; background: var(--sage-dk); color: var(--white); cursor: pointer; }
.next-btn:hover { background: #3a5a54; }

/* ── COMPLETE SCREEN ── */
.complete-screen { flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 20px; }
.complete-card { background: var(--white); border-radius: 18px; padding: 48px 56px;
  text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,.08); max-width: 440px; }
.complete-card h2 { font-family: Georgia, serif; font-size: 24px; color: var(--ink); margin-bottom: 16px; }
.score-big { font-size: 48px; font-weight: 700; color: var(--sage-md); line-height: 1; }
.score-sub { font-size: 13px; color: var(--ink-light); margin-top: 4px; margin-bottom: 24px; }
</style>
</head>
<body>

<div class="header">
  <h1>Travel Planning: <span>ID Flashcards</span></h1>
  <a href="index.html" class="nav-btn">← Home</a>
  <button class="nav-btn" id="reset-btn" onclick="resetGame()" style="display:none">↺ Reset</button>
  <div class="mode-group">
    <button class="mode-btn on" onclick="setMode('easy',this)">Easy</button>
    <button class="mode-btn" onclick="setMode('hard',this)">Hard</button>
  </div>
</div>

<!-- Autocomplete datalist (Easy mode) -->
<datalist id="species-list"></datalist>

<!-- BEGIN -->
<div class="begin-screen" id="view-begin">
  <div class="begin-card">
    <h2>ID Flashcards</h2>
    <p>Test yourself on all the species from your trip list.<br>Cards are shuffled randomly each round.</p>
    <button class="begin-btn" onclick="startGame()">Begin IDing</button>
  </div>
  <div class="begin-stats" id="begin-stats">Loading…</div>
</div>

<!-- GAME -->
<div class="arena" id="view-game" style="display:none">

  <!-- Left: correct -->
  <div class="stack-zone">
    <div class="stack-label">✓ Correct</div>
    <div class="stack-pile" id="stack-correct" onclick="browseStack('correct')">
      <div class="stack-empty" id="stack-correct-empty">0</div>
    </div>
    <div class="stack-count" style="color:var(--correct-dk)" id="count-correct">0</div>
  </div>

  <!-- Central -->
  <div class="central">
    <div class="progress" id="progress">Card 1 of 0</div>
    <div class="card-img card-star" id="card-wrap">
      <span class="card-img-ini" id="card-ini"></span>
      <img id="card-img" style="display:none" onerror="this.style.display='none';document.getElementById('card-ini').style.display='flex'">
      <span class="card-star-badge" id="card-star" style="display:none">★</span>
    </div>

    <!-- Input -->
    <div class="input-area" id="input-area">
      <div class="name-row">
        <input class="name-input" id="name-input" type="text" placeholder="Enter species name…"
               list="species-list" autocomplete="off" onkeydown="if(event.key==='Enter')submitGuess()">
        <button class="submit-btn" onclick="submitGuess()">Submit</button>
      </div>
      <div class="mode-hint" id="mode-hint">EASY — suggestions appear as you type</div>
    </div>

    <!-- Result -->
    <div class="result-area" id="result-area" style="display:none">
      <div class="result-hdr" id="result-hdr">
        <div class="result-verdict">
          <span class="result-icon" id="res-icon"></span>
          <span class="result-vword" id="res-vword"></span>
          <span class="result-star" id="res-star" style="display:none">★</span>
        </div>
        <div class="result-rows">
          <div class="result-meta" id="res-guess-lbl"></div>
          <div class="result-val-guess" id="res-guess-val"></div>
          <div class="result-meta" style="margin-top:5px" id="res-name-lbl"></div>
          <div class="result-val-name" id="res-name-val"></div>
        </div>
      </div>
      <div class="result-body">
        <div class="result-row">
          <span class="result-lbl">Family</span>
          <span class="result-text" id="res-family"></span>
        </div>
        <div class="result-row">
          <span class="result-lbl">Features</span>
          <span class="result-text" id="res-features"></span>
        </div>
        <div class="result-row" id="res-cat-row" style="display:none">
          <span class="result-lbl">Category</span>
          <span class="result-text" id="res-cat"></span>
        </div>
      </div>
      <button class="next-btn" id="next-btn" onclick="nextCard()">Next card →</button>
    </div>
  </div>

  <!-- Right: incorrect -->
  <div class="stack-zone">
    <div class="stack-label">✗ Incorrect</div>
    <div class="stack-pile" id="stack-wrong" onclick="browseStack('wrong')">
      <div class="stack-empty" id="stack-wrong-empty">0</div>
    </div>
    <div class="stack-count" style="color:var(--wrong-dk)" id="count-wrong">0</div>
  </div>
</div>

<!-- COMPLETE -->
<div class="complete-screen" id="view-complete" style="display:none">
  <div class="complete-card">
    <h2>Round Complete!</h2>
    <div class="score-big" id="score-pct"></div>
    <div class="score-sub" id="score-sub"></div>
    <button class="begin-btn" onclick="resetGame()">↺ Play Again</button>
  </div>
</div>

<input type="file" id="fi" accept=".csv" style="display:none">

<script>
var ALL = [], DECK = [], CORRECT = [], WRONG = [];
var CUR = 0, MODE = 'easy', TITLE = '';

var CAT_PALETTE = ['#E6C47A','#C9A26D','#A8B89A','#7FA699','#B7C26B','#7CA6C9','#D9C3A6','#D98F77'];
var CAT_MAP = {};
function getCatColor(cat) {
  if (cat === 'Widespread') return '#D9C3A6';
  if (cat === 'Sing only')  return '#D98F77';
  if (!CAT_MAP[cat]) { CAT_MAP[cat] = CAT_PALETTE[Object.keys(CAT_MAP).length % CAT_PALETTE.length]; }
  return CAT_MAP[cat];
}

function catPillHTML(cat) {
  if (!cat) return '';
  var wide = cat === 'Widespread';
  if (wide) return '<span class="cat-pill cat-pill-wide" style="border-color:#D9C3A6;">' + cat + '</span>';
  return '<span class="cat-pill" style="background:' + getCatColor(cat) + '">' + cat + '</span>';
}

function abbrevFamily(name) {
  var s = name.replace(/ and /g, ' & ');
  if (s.length > 34 && /\s*&\s*Allies$/.test(s)) s = s.replace(/\s*&\s*Allies$/, '');
  return s;
}

function initials(n) {
  return n.split(/[\s\-]+/).slice(0,2).map(function(w){return (w[0]||'').toUpperCase();}).join('');
}

function slug(n) {
  return n.toLowerCase().replace(/[\u2018\u2019']/g,'').replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'');
}

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

/* ── Parse CSV ── */
function splitRow(line) {
  var out=[], cur='', inQ=false;
  for (var i=0; i<line.length; i++) {
    var ch=line[i];
    if (ch==='"'){inQ=!inQ;}
    else if (ch===','&&!inQ){out.push(cur);cur='';}
    else cur+=ch;
  }
  out.push(cur); return out;
}

function parseCSV(txt) {
  var lines = txt.split(/\r?\n/);
  if (lines.length < 2) return [];
  var heads = splitRow(lines[0]).map(function(h){return h.trim().toLowerCase();});
  function col(){
    var names = Array.prototype.slice.call(arguments);
    for (var n=0;n<names.length;n++)
      for (var i=0;i<heads.length;i++)
        if (heads[i]===names[n].toLowerCase()) return i;
    return -1;
  }
  var iName=col('malaysia & singapore'), iNew=col('new'), iFamily=col('family'),
      iID=col('id'), iLoc=col('location'), iRar=col('rarity'), iFam=col('fam'),
      iFeat=col('features'), iCat=col('categories'), iFreq=col('freq');

  var map = {};
  for (var i=1; i<lines.length; i++) {
    var c = splitRow(lines[i]);
    var name = iName>=0 ? (c[iName]||'').trim() : '';
    if (!name) continue;
    if (!map[name]) {
      map[name] = {
        name: name,
        observed: (c[iNew]||'').trim().toLowerCase() === 'no',
        family: (c[iFamily]||'').trim(),
        famNew: (c[iFam]||'').trim().toLowerCase() === 'new',
        id: parseInt((c[iID]||'9999').trim()) || 9999,
        star: iFreq>=0 && (c[iFreq]||'').trim() === '1',
        cats: [],
        features: ''
      };
    } else if ((c[iNew]||'').trim().toLowerCase() === 'no') {
      map[name].observed = true;
    }
    if (!map[name].features && iFeat>=0) map[name].features = (c[iFeat]||'').trim();
    if (iCat>=0) {
      var cv = (c[iCat]||'').trim();
      if (cv && map[name].cats.indexOf(cv) < 0) map[name].cats.push(cv);
    }
    if (iFreq>=0 && (c[iFreq]||'').trim() === '1') map[name].star = true;
  }

  var list = Object.values(map);
  list.sort(function(a,b){return a.id - b.id;});
  TITLE = splitRow(lines[0])[0].trim();
  return list;
}

function loadCSV(txt) {
  ALL = parseCSV(txt);
  document.getElementById('begin-stats').textContent =
    ALL.length + ' species · ' + (MODE === 'easy' ? 'Easy' : 'Hard') + ' mode';
  // Build datalist
  var dl = document.getElementById('species-list');
  dl.innerHTML = '';
  ALL.forEach(function(sp) {
    var opt = document.createElement('option');
    opt.value = sp.name;
    dl.appendChild(opt);
  });
  document.getElementById('reset-btn').style.display = '';
}

/* ── Game logic ── */
function startGame() {
  DECK = shuffle(ALL);
  CORRECT = []; WRONG = []; CUR = 0;
  document.getElementById('view-begin').style.display = 'none';
  document.getElementById('view-complete').style.display = 'none';
  document.getElementById('view-game').style.display = 'flex';
  updateStacks();
  showCard();
}

function resetGame() {
  CAT_MAP = {};
  startGame();
}

function showCard() {
  if (CUR >= DECK.length) { showComplete(); return; }
  var sp = DECK[CUR];
  document.getElementById('progress').textContent = 'Card ' + (CUR+1) + ' of ' + DECK.length;

  // Photo
  var img = document.getElementById('card-img');
  var ini = document.getElementById('card-ini');
  var star = document.getElementById('card-star');
  var wrap = document.getElementById('card-wrap');

  ini.textContent = initials(sp.name);
  ini.style.display = 'flex';
  img.style.display = 'none';
  img.src = 'photos/' + slug(sp.name) + '.jpg';
  img.onload = function() { ini.style.display='none'; img.style.display='block'; };
  img.onerror = function() { this.style.display='none'; ini.style.display='flex'; };

  // Star badge
  star.style.display = sp.star ? '' : 'none';

  // Tile color
  var bg = sp.observed ? '#867594' : '#B576A6';
  wrap.style.background = bg;
  ini.style.color = 'rgba(255,255,255,0.85)';

  // Reset input
  document.getElementById('name-input').value = '';
  document.getElementById('input-area').style.display = 'flex';
  document.getElementById('result-area').style.display = 'none';
  document.getElementById('name-input').focus();
}

function submitGuess() {
  if (CUR >= DECK.length) return;
  var sp = DECK[CUR];
  var guess = document.getElementById('name-input').value.trim();
  if (!guess) return;

  var correct = guess.toLowerCase() === sp.name.toLowerCase();

  // Build result
  var hdr = document.getElementById('result-hdr');
  hdr.className = 'result-hdr ' + (correct ? 'correct' : 'wrong');
  document.getElementById('res-icon').textContent = correct ? '✓' : '✗';
  document.getElementById('res-vword').textContent = correct ? 'Correct!' : 'Incorrect';
  document.getElementById('res-star').style.display = sp.star ? '' : 'none';

  document.getElementById('res-guess-lbl').textContent = 'Your answer';
  document.getElementById('res-guess-val').textContent = guess;
  document.getElementById('res-name-lbl').textContent = correct ? 'Species' : 'Correct species';
  document.getElementById('res-name-val').textContent = sp.name;

  document.getElementById('res-family').textContent = abbrevFamily(sp.family) || '—';
  document.getElementById('res-features').textContent = sp.features || '—';

  // Category
  var catRow = document.getElementById('res-cat-row');
  var catEl = document.getElementById('res-cat');
  if (sp.cats && sp.cats.length) {
    catEl.innerHTML = sp.cats.map(catPillHTML).join(' ');
    catRow.style.display = 'flex';
  } else {
    catRow.style.display = 'none';
  }

  // Next button label
  document.getElementById('next-btn').textContent =
    CUR + 1 < DECK.length ? 'Next card →' : 'See results →';

  // Add to stack
  if (correct) { CORRECT.push(sp); } else { WRONG.push(sp); }
  updateStacks();

  document.getElementById('input-area').style.display = 'none';
  document.getElementById('result-area').style.display = 'block';
}

function nextCard() {
  CUR++;
  if (CUR >= DECK.length) { showComplete(); return; }
  showCard();
}

/* ── Stacks ── */
function updateStacks() {
  renderStack('correct', CORRECT, '#C6D29A', '#5a7a30');
  renderStack('wrong', WRONG, '#f0b8b8', '#a03030');
  document.getElementById('count-correct').textContent = CORRECT.length;
  document.getElementById('count-wrong').textContent = WRONG.length;
}

function renderStack(side, arr, bgColor, textColor) {
  var pile = document.getElementById('stack-' + side);
  var empty = document.getElementById('stack-' + side + '-empty');
  if (!arr.length) {
    empty.style.display = 'flex'; empty.textContent = '0'; return;
  }
  empty.style.display = 'none';
  // Show up to 3 stacked cards
  pile.innerHTML = '';
  var show = Math.min(arr.length, 3);
  for (var i = 0; i < show; i++) {
    var sp = arr[arr.length - show + i];
    var card = document.createElement('div');
    card.className = 'stack-card';
    var depth = show - 1 - i;
    card.style.top = (depth * 4) + 'px';
    card.style.left = (depth * 4) + 'px';
    card.style.opacity = i === show-1 ? '1' : (i === show-2 ? '.65' : '.35');
    card.style.background = sp.observed ? '#867594' : '#B576A6';
    var img = document.createElement('img');
    img.src = 'photos/' + slug(sp.name) + '.jpg';
    img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;';
    var ini = document.createElement('div');
    ini.className = 'stack-ini';
    ini.textContent = initials(sp.name);
    ini.style.display = 'none';
    img.onerror = function(el){ return function(){el.style.display='none'; el.nextSibling.style.display='flex';}; }(img);
    card.appendChild(img); card.appendChild(ini);
    pile.appendChild(card);
  }
}

function browseStack(side) {
  var arr = side === 'correct' ? CORRECT : WRONG;
  if (!arr.length) return;
  alert(arr.map(function(s,i){return (i+1)+'. '+s.name;}).join('\n'));
}

/* ── Complete ── */
function showComplete() {
  document.getElementById('view-game').style.display = 'none';
  document.getElementById('view-complete').style.display = 'flex';
  var pct = DECK.length ? Math.round(CORRECT.length / DECK.length * 100) : 0;
  document.getElementById('score-pct').textContent = pct + '%';
  document.getElementById('score-sub').textContent =
    CORRECT.length + ' correct · ' + WRONG.length + ' incorrect · ' + DECK.length + ' total';
}

/* ── Mode ── */
function setMode(m, btn) {
  MODE = m;
  document.querySelectorAll('.mode-btn').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');
  var input = document.getElementById('name-input');
  input.setAttribute('list', m === 'easy' ? 'species-list' : '');
  document.getElementById('mode-hint').textContent =
    m === 'easy' ? 'EASY — suggestions appear as you type' : 'HARD — no suggestions, spell carefully';
  document.getElementById('begin-stats').textContent =
    ALL.length + ' species · ' + (m === 'easy' ? 'Easy' : 'Hard') + ' mode';
}

/* ── Auto-load CSV ── */
(function(){
  var xhr = new XMLHttpRequest();
  xhr.open('GET', 'location.csv');
  xhr.onload = function(){ if (xhr.status===200) loadCSV(xhr.responseText); };
  xhr.onerror = function(){};
  try { xhr.send(); } catch(e){}
})();
</script>
