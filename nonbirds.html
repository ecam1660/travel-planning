<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Non-Birds</title>
<link rel="icon" type="image/png" href="travelfav_3.png">
<style>
:root {
  --ink: #2e2218; --ink-mid: #5a4a38; --ink-light: #9a8870;
  --cream: #f7f2eb; --white: #ffffff;
  --border: rgba(46,34,24,0.12); --border-s: rgba(46,34,24,0.20);
  --shadow: 0 1px 6px rgba(46,34,24,0.08); --shadow-h: 0 4px 18px rgba(46,34,24,0.14);
  --radius: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--cream); color: var(--ink); display: flex; flex-direction: column; min-height: 100vh; }

/* Category color schemes (from CA Nature Tracker) */
.cat-lizards           { --c1:#9AA65A; --c2:#C6D29A; --c3:#E8F0D4; --cd:#5a6a32; }
.cat-mammals           { --c1:#8A7362; --c2:#BBA99B; --c3:#E8DDD4; --cd:#4e3f34; }
.cat-butterflies       { --c1:#8B6E98; --c2:#C5B3D6; --c3:#EAE3F2; --cd:#5a4268; }
.cat-frogs-toads       { --c1:#6E8F5E; --c2:#A7C39A; --c3:#D8EDD0; --cd:#3e5e30; }
.cat-flowering-plants  { --c1:#A16B7A; --c2:#CDA2AD; --c3:#F0DDE2; --cd:#6a3a48; }
.cat-sea-stars         { --c1:#C46D48; --c2:#E29A7A; --c3:#F5DDD0; --cd:#7a3e20; }
.cat-birds             { --c1:#C46D48; --c2:#E29A7A; --c3:#F5DDD0; --cd:#7a3e20; }
.cat-snakes            { --c1:#C2A98B; --c2:#E1D3BB; --c3:#F2EBD8; --cd:#6a5840; }
.cat-newts-salamanders { --c1:#4F7F72; --c2:#9EC9BF; --c3:#D0EDE8; --cd:#264f45; }
.cat-moths             { --c1:#64686C; --c2:#B0B3B6; --c3:#E2E4E6; --cd:#36393c; }
.cat-turtles           { --c1:#4B7E8E; --c2:#93C1CC; --c3:#D0E8EE; --cd:#224e5e; }
.cat-nudibranchs       { --c1:#D1A53B; --c2:#EBCB77; --c3:#F7EBC8; --cd:#8a6410; }
.cat-dragonflies       { --c1:#5D6A9E; --c2:#A5AED6; --c3:#DDE0F2; --cd:#323e72; }
.cat-damselflies       { --c1:#6E8FB8; --c2:#B1C7DF; --c3:#DAE9F4; --cd:#3a5e88; }
.cat-default           { --c1:#64686C; --c2:#B0B3B6; --c3:#E2E4E6; --cd:#36393c; }

/* Header */
.header { background: #4a6e68; padding: 14px 28px; display: flex; align-items: center; gap: 16px;
  flex-shrink: 0; border-bottom: 3px solid #6F928A; }
.header h1 { font-family: Georgia, 'Times New Roman', serif; font-size: 20px; font-weight: 400;
  color: #C4D4C8; flex: 1; letter-spacing: .01em; }
.header h1 span { color: #e8f0ee; font-weight: 400; }
.hcount { font-size: 11px; color: #95B5AB; font-weight: 500; white-space: nowrap; }
.nav-btn { font-size: 11px; font-weight: 500; padding: 7px 14px; border-radius: 99px;
  border: 1px solid rgba(196,212,200,.3); background: rgba(255,255,255,.08); color: #C4D4C8;
  cursor: pointer; text-decoration: none; transition: background .15s; }
.nav-btn:hover { background: rgba(255,255,255,.14); }

/* Toolbar */
.toolbar { background: var(--white); border-bottom: 1px solid var(--border); flex-shrink: 0; }
.trow { display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
  padding: 8px 22px; border-bottom: 1px solid var(--border); }
.trow:last-child { border-bottom: none; }
.fl { font-size: 10px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-weight: 600; text-transform: uppercase; letter-spacing: .07em; color: var(--ink-light); white-space: nowrap; }
.sw { position: relative; }
.sw input { font-size: 11px; padding: 5px 10px 5px 28px; border: 1px solid var(--border-s);
  border-radius: 99px; background: var(--cream); color: var(--ink); outline: none; width: 200px; }
.sw input:focus { border-color: #6F928A; }
.sw svg { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); opacity: .4; pointer-events: none; }
.chip { font-size: 11px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-weight: 500; padding: 4px 12px; border-radius: 99px; border: 1px solid var(--border-s);
  background: var(--cream); color: var(--ink-mid); cursor: pointer; white-space: nowrap;
  transition: background .12s, color .12s, border-color .12s; }
.chip:hover { border-color: #6F928A; }
.chip.on { background: #6F928A; color: var(--white); border-color: #6F928A; }
.loc-chip { font-size: 11px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-weight: 500; padding: 4px 11px; border-radius: 99px; border: 1px solid var(--border-s);
  background: var(--cream); color: var(--ink-mid); cursor: pointer; white-space: nowrap;
  transition: background .12s, color .12s, border-color .12s; }
.loc-chip:hover { border-color: #95B5AB; }
.loc-chip.on { background: #C4D4C8; color: var(--ink); border-color: #C4D4C8; }

/* rbar */
.rbar { padding: 5px 22px; font-size: 11px; color: var(--ink-light);
  border-bottom: 1px solid var(--border); background: var(--white); flex-shrink: 0; }
.rbar strong { color: var(--ink); }

/* Grid */
.grid-wrap { flex: 1; overflow-y: auto; padding: 16px 22px 40px; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 10px; }

/* Tiles */
.scene { height: 104px; perspective: 900px; cursor: default; }
.pt-inner { position: relative; width: 100%; height: 100%;
  transform-style: preserve-3d; transition: transform .45s cubic-bezier(.4,0,.2,1);
  border-radius: var(--radius); box-shadow: var(--shadow); }
.pt-inner:hover { box-shadow: var(--shadow-h); }
.scene.flipped .pt-inner { transform: rotateY(180deg); }
.face { position: absolute; width: 100%; height: 100%;
  backface-visibility: hidden; -webkit-backface-visibility: hidden;
  border-radius: var(--radius); border: .5px solid rgba(0,0,0,.12); overflow: hidden; display: flex; }
.face-back { transform: rotateY(180deg); }

.pt-photo { flex-shrink: 0; width: 104px; height: 104px; position: relative; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  background: var(--c1); }
.pt-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
.pt-photo-ini { font-size: 17px; font-weight: 500; color: rgba(255,255,255,0.9);
  letter-spacing: 0.04em; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.pt-right { flex: 1; min-width: 0; display: flex; flex-direction: column; background: var(--c2); }
.pt-hdr { display: flex; align-items: center; padding: 7px 8px 1px 9px; gap: 5px; }
.pt-name { font-size: 12.5px; font-weight: 600; flex: 1; white-space: nowrap; overflow: hidden;
  text-overflow: ellipsis; min-width: 0; font-family: Georgia, serif; color: var(--cd); }
.pt-ob { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center;
  justify-content: center; font-size: 10px; font-weight: 700; flex-shrink: 0;
  cursor: pointer; transition: all .15s; user-select: none; z-index: 2; }
.pt-ob:hover { opacity: .8; transform: scale(1.1); }
.pt-fam-row { padding: 1px 8px 4px 9px; }
.pt-fam { font-size: 10px; opacity: .65; color: var(--cd); }
.pt-grid { display: flex; border-top: .5px solid rgba(0,0,0,.10); margin-top: auto; }
.pt-col { flex: 1; display: flex; flex-direction: column; border-right: .5px solid rgba(0,0,0,.08); }
.pt-col:last-child { border-right: none; }
.pt-loc { font-size: 7.5px; font-weight: 600; padding: 3px 2px 2px; text-align: center;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  border-bottom: .5px solid rgba(0,0,0,.08); background: var(--c3); color: var(--cd); }
.pt-rar { font-size: 7.5px; font-weight: 500; padding: 3px 2px; text-align: center;
  background: #e4e2de; color: #5a5854; }
.pt-col-empty .pt-loc { background: #f0ece8; color: #b8a898; }
.pt-col-empty .pt-rar { background: #f5f2ee; color: #c0b8b0; }

/* Back face */
.back-full { flex: 1; display: flex; flex-direction: column;
  padding: 9px 11px 10px; background: var(--c2); }
.back-hdr { display: flex; align-items: center; gap: 5px; margin-bottom: 7px;
  padding-bottom: 6px; border-bottom: .5px solid rgba(0,0,0,.10); }
.back-name { font-size: 12.5px; font-weight: 600; flex: 1; white-space: nowrap; overflow: hidden;
  text-overflow: ellipsis; min-width: 0; font-family: Georgia, serif; color: var(--cd); }
.back-notes { font-size: 9.5px; line-height: 1.45; color: var(--cd); }

.empty-state { grid-column: 1/-1; text-align: center; padding: 60px 20px;
  font-size: 14px; font-style: italic; color: var(--ink-light); }
</style>
</head>
<body>

<div class="header">
  <h1>Travel Planning: <span>Non-Birds</span></h1>
  <a href="index.html" class="nav-btn">← Birds</a>
  <span class="hcount" id="hcount"></span>
</div>

<div class="toolbar">
  <div class="trow">
    <div class="sw">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="search" placeholder="Search species...">
    </div>
    <span class="fl" style="margin-left:8px">Status</span>
    <button class="chip on" id="st-all" onclick="setStatus('all')">All</button>
    <button class="chip" id="st-seen" onclick="setStatus('seen')">Observed ✓</button>
    <button class="chip" id="st-unseen" onclick="setStatus('unseen')">Targets only</button>
  </div>
  <div class="trow">
    <span class="fl">Site</span>
    <div id="loc-chips" style="display:flex;gap:6px;flex-wrap:wrap;"></div>
  </div>
  <div class="trow" id="cat-row" style="display:none;">
    <span class="fl">Category</span>
    <div id="cat-chips" style="display:flex;gap:6px;flex-wrap:wrap;"></div>
  </div>
</div>

<div class="rbar" id="rbar" style="display:none">
  <span id="rbar-txt"></span>
</div>

<div class="grid-wrap">
  <div class="grid" id="grid"></div>
</div>

<input type="file" id="fi" accept=".csv" style="display:none">

<script>
var ALL = [], STATUS = 'all', ACTIVE_SITES = [], ACTIVE_CATS = [], QUERY = '';
var SITES = [], CATS = [];
var LOCAL_KEY = 'nonbirds_observed_';
var TITLE = '';

var CAT_CLASS = {
  'lizards':              'cat-lizards',
  'mammals':              'cat-mammals',
  'butterflies':          'cat-butterflies',
  'frogs & toads':        'cat-frogs-toads',
  'frogs':                'cat-frogs-toads',
  'flowering plants':     'cat-flowering-plants',
  'flowers':              'cat-flowering-plants',
  'sea stars':            'cat-sea-stars',
  'birds':                'cat-birds',
  'snakes':               'cat-snakes',
  'newts & salamanders':  'cat-newts-salamanders',
  'salamanders':          'cat-newts-salamanders',
  'newts':                'cat-newts-salamanders',
  'moths':                'cat-moths',
  'turtles & tortoises':  'cat-turtles',
  'turtles':              'cat-turtles',
  'nudibranchs':          'cat-nudibranchs',
  'dragonflies':          'cat-dragonflies',
  'damselflies':          'cat-damselflies'
};
function getCatClass(cat) { return CAT_CLASS[(cat||'').toLowerCase()] || 'cat-default'; }

function initials(n) {
  return n.split(/[\s\-]+/).slice(0,2).map(function(w){return (w[0]||'').toUpperCase();}).join('');
}
function slug(n) {
  return n.toLowerCase().replace(/[\u2018\u2019']/g,'').replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'');
}
function tryExt(img, sl, exts) {
  if (!exts.length) { img.style.display='none'; img.nextElementSibling.style.display='flex'; return; }
  img.onerror = function(){ tryExt(img, sl, exts.slice(1)); };
  img.src = 'photos/' + sl + '.' + exts[0];
}

/* localStorage observed */
function storageKey() { return LOCAL_KEY + TITLE.replace(/\s/g,'_'); }
function getOverrides() { try { return JSON.parse(localStorage.getItem(storageKey())||'{}'); } catch(e){ return {}; } }
function setOverride(name, val) { var o=getOverrides(); o[name]=val; try{localStorage.setItem(storageKey(),JSON.stringify(o));}catch(e){} }
function isObserved(sp) { var o=getOverrides(); return o.hasOwnProperty(sp.name)?o[sp.name]:sp.observed; }

function abbrevName(name, threshold) {
  if (!threshold) threshold = 29;
  if (name.length <= threshold) return name;
  var map = [
    [/\bNorthern\b/g,'N.'],[/\bSouthern\b/g,'S.'],[/\bEastern\b/g,'E.'],[/\bWestern\b/g,'W.'],
    [/\bGreater\b/g,'Gr.'],[/\bLesser\b/g,'Lr.'],[/\bCommon\b/g,'C.'],[/\bAmerican\b/g,'Am.'],
    [/\bCalifornia\b/g,'CA'],[/\bPacific\b/g,'Pac.'],[/\bMountain\b/g,'Mt.']
  ];
  var s = name;
  for (var i=0;i<map.length;i++){if(s.length<=threshold)break;s=s.replace(map[i][0],map[i][1]);}
  return s;
}

/* Build tile */
function buildTile(sp) {
  var obs = isObserved(sp);
  var catcl = getCatClass(sp.cat);
  var sl = slug(sp.name);
  var ini = initials(sp.name);
  var catline = sp.sub ? sp.cat + ': ' + sp.sub : sp.cat;
  var obStyle = obs
    ? 'background:var(--c1);color:#fff;border:none;'
    : 'background:transparent;border:2px solid var(--c1);color:transparent;';
  var obTxt = obs ? '✓' : '';

  var gridHTML = '<div class="pt-grid">';
  for (var i=0; i<6; i++) {
    var l = sp.locs[i];
    if (l) {
      gridHTML += '<div class="pt-col"><div class="pt-loc">' + l[0] + '</div><div class="pt-rar">' + l[1] + '</div></div>';
    } else {
      gridHTML += '<div class="pt-col pt-col-empty"><div class="pt-loc">—</div><div class="pt-rar">—</div></div>';
    }
  }
  gridHTML += '</div>';

  var scene = document.createElement('div');
  scene.className = 'scene ' + catcl;
  scene.dataset.name = sp.name;

  var inner = document.createElement('div');
  inner.className = 'pt-inner';

  var front = document.createElement('div');
  front.className = 'face';
  front.innerHTML =
    '<div class="pt-photo">'
    + '<img src="photos/' + sl + '.jpg" style="display:block"'
    + ' onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\';tryExt(this,\'' + sl + '\',[\'png\',\'webp\'])">'
    + '<div class="pt-photo-ini" style="display:none;">' + ini + '</div>'
    + '</div>'
    + '<div class="pt-right">'
    +   '<div class="pt-hdr"><span class="pt-name">' + abbrevName(sp.name,29) + '</span>'
    +   '<div class="pt-ob" style="' + obStyle + '" data-name="' + sp.name + '">' + obTxt + '</div></div>'
    +   '<div class="pt-fam-row"><span class="pt-fam">' + catline + '</span></div>'
    +   gridHTML
    + '</div>';

  var back = document.createElement('div');
  back.className = 'face face-back';
  back.innerHTML =
    '<div class="back-full">'
    +   '<div class="back-hdr">'
    +     '<span class="back-name">' + abbrevName(sp.name,32) + '</span>'
    +     '<div class="pt-ob" style="' + obStyle + '" data-name="' + sp.name + '">' + obTxt + '</div>'
    +   '</div>'
    +   (sp.notes ? '<div class="back-notes">' + sp.notes + '</div>' : '')
    + '</div>';

  inner.appendChild(front);
  inner.appendChild(back);
  scene.appendChild(inner);

  scene.addEventListener('click', function(e) {
    var obBtn = e.target.closest('.pt-ob');
    if (obBtn) {
      var name = obBtn.dataset.name;
      var sp2 = ALL.filter(function(s){return s.name===name;})[0];
      if (!sp2) return;
      setOverride(name, !isObserved(sp2));
      var wasFlipped = scene.classList.contains('flipped');
      var newTile = buildTile(sp2);
      if (wasFlipped) newTile.classList.add('flipped');
      scene.parentNode.replaceChild(newTile, scene);
      updateCount();
      return;
    }
    var rect = scene.getBoundingClientRect();
    var x = e.clientX - rect.left, y = e.clientY - rect.top;
    if (x > rect.width * 0.6 && y > rect.height * 0.5) {
      scene.classList.toggle('flipped');
    }
  });

  return scene;
}

/* Status */
function setStatus(s) {
  STATUS = s;
  ['all','seen','unseen'].forEach(function(k){document.getElementById('st-'+k).classList.toggle('on',k===s);});
  render();
}

/* Site chips */
function buildSiteChips() {
  var c = document.getElementById('loc-chips');
  c.innerHTML = '';
  var allBtn = document.createElement('button');
  allBtn.className = 'loc-chip on'; allBtn.id = 'loc-all'; allBtn.textContent = 'All';
  allBtn.addEventListener('click', function(){
    ACTIVE_SITES = SITES.slice();
    document.querySelectorAll('.loc-chip[data-site]').forEach(function(x){x.classList.remove('on');});
    allBtn.classList.add('on'); render();
  });
  c.appendChild(allBtn);
  SITES.forEach(function(site){
    var b = document.createElement('button');
    b.className = 'loc-chip'; b.textContent = site; b.dataset.site = site;
    b.addEventListener('click', function(){
      allBtn.classList.remove('on'); b.classList.toggle('on');
      ACTIVE_SITES = Array.from(document.querySelectorAll('.loc-chip[data-site].on')).map(function(x){return x.dataset.site;});
      if (!ACTIVE_SITES.length){allBtn.classList.add('on');ACTIVE_SITES=SITES.slice();}
      render();
    });
    c.appendChild(b);
  });
  ACTIVE_SITES = SITES.slice();
}

/* Category chips */
function buildCatChips() {
  var c = document.getElementById('cat-chips');
  if (!c) return;
  c.innerHTML = '';
  if (!CATS.length) { document.getElementById('cat-row').style.display='none'; return; }
  document.getElementById('cat-row').style.display = 'flex';
  var allBtn = document.createElement('button');
  allBtn.className = 'loc-chip on'; allBtn.id = 'cat-all'; allBtn.textContent = 'All';
  allBtn.addEventListener('click', function(){
    ACTIVE_CATS = CATS.slice();
    document.querySelectorAll('.cat-chip[data-cat]').forEach(function(x){x.classList.remove('on');});
    allBtn.classList.add('on'); render();
  });
  c.appendChild(allBtn);
  CATS.forEach(function(cat){
    var b = document.createElement('button');
    b.className = 'cat-chip loc-chip'; b.textContent = cat; b.dataset.cat = cat;
    b.addEventListener('click', function(){
      allBtn.classList.remove('on'); b.classList.toggle('on');
      b.style.background = b.classList.contains('on') ? 'var(--c1,#6F928A)' : '';
      b.style.borderColor = b.classList.contains('on') ? 'var(--c1,#6F928A)' : '';
      b.style.color = b.classList.contains('on') ? '#fff' : '';
      ACTIVE_CATS = Array.from(document.querySelectorAll('.cat-chip[data-cat].on')).map(function(x){return x.dataset.cat;});
      if (!ACTIVE_CATS.length){allBtn.classList.add('on');ACTIVE_CATS=CATS.slice();}
      render();
    });
    c.appendChild(b);
  });
  ACTIVE_CATS = CATS.slice();
}

/* Render */
function render() {
  var q = document.getElementById('search').value.toLowerCase();
  var f = ALL.filter(function(sp){
    if (q && sp.name.toLowerCase().indexOf(q) < 0 && sp.cat.toLowerCase().indexOf(q) < 0) return false;
    var obs = isObserved(sp);
    if (STATUS==='seen' && !obs) return false;
    if (STATUS==='unseen' && obs) return false;
    var hasLoc = sp.locs.some(function(l){return l && ACTIVE_SITES.indexOf(l[0])>=0;});
    if (!hasLoc) return false;
    if (CATS.length && ACTIVE_CATS.length < CATS.length) {
      if (ACTIVE_CATS.indexOf(sp.cat) < 0) return false;
    }
    return true;
  });
  var grid = document.getElementById('grid');
  grid.innerHTML = '';
  if (!f.length) {
    grid.innerHTML = '<div class="empty-state">No species match these filters.</div>';
  } else {
    f.forEach(function(sp){grid.appendChild(buildTile(sp));});
  }
  document.getElementById('rbar').style.display = 'flex';
  document.getElementById('rbar-txt').innerHTML = 'Showing <strong>'+f.length+'</strong> of <strong>'+ALL.length+'</strong> species';
  updateCount();
}

function updateCount() {
  var obs = ALL.filter(function(sp){return isObserved(sp);}).length;
  document.getElementById('hcount').textContent = obs+' observed · '+(ALL.length-obs)+' targets';
}

/* Parse CSV */
function splitRow(line) {
  var out=[],cur='',inQ=false;
  for (var i=0;i<line.length;i++){var ch=line[i];if(ch==='"'){inQ=!inQ;}else if(ch===','&&!inQ){out.push(cur);cur='';}else cur+=ch;}
  out.push(cur); return out;
}

function parseCSV(txt) {
  var lines = txt.split(/\r?\n/);
  if (lines.length < 2) return [];
  var heads = splitRow(lines[0]).map(function(h){return h.trim().toLowerCase();});
  function col(){
    var names=Array.prototype.slice.call(arguments);
    for(var n=0;n<names.length;n++) for(var i=0;i<heads.length;i++) if(heads[i]===names[n].toLowerCase()) return i;
    return -1;
  }
  var iName=col('name'), iCat=col('category'), iSub=col('subcategory'), iObs=col('observed'),
      iSite=col('site'), iCnt=col('obs count'), iNotes=col('notes');

  var map = {};
  for (var i=1; i<lines.length; i++) {
    var c = splitRow(lines[i]);
    var name = iName>=0 ? (c[iName]||'').trim() : '';
    if (!name) continue;
    if (!map[name]) {
      map[name] = {
        name: name,
        cat:  iCat>=0 ? (c[iCat]||'').trim() : '',
        sub:  iSub>=0 ? (c[iSub]||'').trim() : '',
        observed: iObs>=0 && (c[iObs]||'').trim().toLowerCase() === 'yes',
        notes: iNotes>=0 ? (c[iNotes]||'').trim() : '',
        locs: []
      };
    }
    // Observed: if any row says Yes, mark as observed
    if (iObs>=0 && (c[iObs]||'').trim().toLowerCase() === 'yes') map[name].observed = true;
    // Notes: first non-empty wins
    if (!map[name].notes && iNotes>=0) map[name].notes = (c[iNotes]||'').trim();
    // Site
    var site = iSite>=0 ? (c[iSite]||'').trim() : '';
    var cnt  = iCnt>=0  ? parseInt((c[iCnt]||'0').trim()) || 0 : 0;
    if (site) map[name].locs.push([site, cnt]);
  }

  var list = Object.values(map);
  list.forEach(function(sp){
    // Sort locs: highest count first
    sp.locs.sort(function(a,b){return b[1]-a[1];});
    while (sp.locs.length < 6) sp.locs.push(null);
    sp.locs = sp.locs.slice(0,6);
  });
  list.sort(function(a,b){return a.name.localeCompare(b.name);});
  return list;
}

function loadCSV(txt) {
  ALL = parseCSV(txt);
  // Sites
  var siteSet = {};
  ALL.forEach(function(sp){sp.locs.forEach(function(l){if(l) siteSet[l[0]]=1;});});
  SITES = Object.keys(siteSet).sort();
  buildSiteChips();
  // Categories
  var catSet = {};
  ALL.forEach(function(sp){if(sp.cat) catSet[sp.cat]=1;});
  CATS = Object.keys(catSet).sort();
  ACTIVE_CATS = CATS.slice();
  buildCatChips();
  document.getElementById('rbar').style.display = 'flex';
  render();
}

/* Search */
document.getElementById('search').addEventListener('input', function(){ render(); });

/* Auto-load CSV */
(function(){
  var xhr = new XMLHttpRequest();
  xhr.open('GET', 'nonbirds.csv');
  xhr.onload = function(){ if(xhr.status===200) loadCSV(xhr.responseText); };
  xhr.onerror = function(){};
  try{xhr.send();}catch(e){}
})();
</script>
